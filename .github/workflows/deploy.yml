name: Deploy to Heroku

# Auto-deploys on every push to main. Heroku then runs the buildpack
# (heroku-postbuild) and the release phase (prisma migrate deploy + seed)
# defined in the Procfile. Trigger manually via the Actions tab too.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: heroku-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Heroku's git deploy needs full history

      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.13.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          # Verify the deploy is live; roll back automatically if it isn't.
          healthcheck: "https://${{ secrets.HEROKU_APP_NAME }}.herokuapp.com/api/health"
          checkstring: "ok"
          delay: 25
          rollbackonhealthcheckfailed: true
